<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Grest Leaderboard 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .card { transition: all 0.2s; }
        .card:active { transform: scale(0.98); background-color: #334155; }
        .modal { animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-punti { 
            touch-action: manipulation;
            user-select: none;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-punti:active {
            transform: scale(0.95);
            background-color: #4b5563 !important;
        }
        
        .btn-punti:active::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple 0.3s ease-out;
        }
        
        @keyframes ripple {
            to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        
        .punti-incremento {
            position: fixed;
            color: #f59e0b;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .tab-button {
            transition: all 0.2s;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
        }

        .tab-button.active {
            background-color: #f59e0b;
            color: #0f172a;
        }

        .fascia-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .fascia-1 { background-color: #f59e0b; color: #0f172a; }
        .fascia-2 { background-color: #64748b; color: #f8fafc; }
        .fascia-3 { background-color: #b45309; color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200">
    <div id="app" class="min-h-screen flex flex-col"></div>

    <script type="module">
        // Import Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBDFKuynAUskoBtT2yUCBtJLpeNjoBrqr8",
            authDomain: "classificaanimatori.firebaseapp.com",
            projectId: "classificaanimatori",
            storageBucket: "classificaanimatori.firebasestorage.app",
            messagingSenderId: "405806350553",
            appId: "1:405806350553:web:7329e6bdfd3d0ce8a57ec8",
            measurementId: "G-MW7992BT9Y"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const animatoriRef = collection(db, "animatori");
        const squadreRef = collection(db, "squadre");

        // === STATO ===
        let isAdmin = false;
        let animatori = [];
        let squadre = [];
        let unsubscribeAnimatori = null;
        let unsubscribeSquadre = null;
        let currentTab = 'tutti'; // 'tutti', 'animatori', 'aiuti', 'squadre'

        // === FUNZIONI UTILITY ===
        const escapeHtml = (text) => {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };

        const mostraIncremento = (x, y, valore) => {
            const el = document.createElement('div');
            el.className = 'punti-incremento';
            el.textContent = valore > 0 ? `+${valore}` : `${valore}`;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        };

        const getNomeSquadra = (squadraId) => {
            if (!squadraId) return 'Senza squadra';
            const squadra = squadre.find(s => s.id === squadraId);
            return squadra ? squadra.nome : 'Squadra sconosciuta';
        };

        const getFasciaSquadra = (squadraId) => {
            if (!squadraId) return null;
            const squadra = squadre.find(s => s.id === squadraId);
            return squadra ? squadra.fascia : null;
        };

        // === CALCOLA PUNTI TOTALI SQUADRA ===
        const calcolaPuntiSquadra = (squadraId) => {
            return animatori
                .filter(a => a.squadraId === squadraId)
                .reduce((sum, a) => sum + (a.punti || 0), 0);
        };

        // === CAMBIA TAB ===
        const cambiaTab = (tab) => {
            currentTab = tab;
            render();
        };

        // === RENDER PRINCIPALE ===
        const render = () => {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <!-- HEADER -->
                <header class="bg-slate-800 px-4 py-3 sticky top-0 z-10 shadow-lg flex justify-between items-center">
                    <h1 class="text-xl font-bold text-amber-400">🏆 GREST 2026</h1>
                    ${!isAdmin 
                        ? '<button id="btnLogin" class="bg-slate-700 px-4 py-2 rounded-lg text-sm hover:bg-slate-600">🔑 Admin</button>'
                        : '<button id="btnLogout" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg text-sm hover:bg-red-500/30">🚪 Esci</button>'
                    }
                </header>

                <!-- PANNELLO ADMIN (solo se admin) -->
                ${isAdmin ? `
                    <div class="bg-slate-800/50 px-4 py-2 flex gap-2 border-b border-slate-700">
                        <button id="btnAggiungiAnimatore" class="bg-amber-500 text-slate-900 px-4 py-2 rounded-lg flex-1 font-bold hover:bg-amber-400">➕ Nuovo Animatore</button>
                        <button id="btnGestisciSquadre" class="bg-slate-700 text-white px-4 py-2 rounded-lg flex-1 font-bold hover:bg-slate-600">⚙️ Gestisci Squadre</button>
                    </div>
                ` : ''}

                <!-- TAB NAVIGATION -->
                <div class="bg-slate-800 px-4 py-3 flex justify-around gap-2 border-b border-slate-700">
                    <button id="tabTutti" class="tab-button flex-1 ${currentTab === 'tutti' ? 'active bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">
                        📊 Tutti
                    </button>
                    <button id="tabAnimatori" class="tab-button flex-1 ${currentTab === 'animatori' ? 'active bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">
                        👤 Animatori
                    </button>
                    <button id="tabAiuti" class="tab-button flex-1 ${currentTab === 'aiuti' ? 'active bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">
                        🆘 Aiuti
                    </button>
                    <button id="tabSquadre" class="tab-button flex-1 ${currentTab === 'squadre' ? 'active bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">
                        🏆 Squadre
                    </button>
                </div>

                <!-- CONTENUTO PRINCIPALE -->
                <main id="mainContent" class="flex-1 p-4 pb-20">
                    ${animatori.length === 0 && squadre.length === 0 ? '<div class="text-center text-slate-500 py-8">Caricamento...</div>' : ''}
                </main>

                <!-- FOOTER -->
                <footer class="bg-slate-800 px-4 py-2 text-xs text-slate-400 fixed bottom-0 w-full border-t border-slate-700 flex justify-between">
                    <span>👥 <span id="totaleAnimatori">${animatori.length}</span> animatori | 🏢 <span id="totaleSquadre">${squadre.length}</span> squadre</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> LIVE</span>
                </footer>
            `;

            // Event listeners
            document.getElementById('btnLogin')?.addEventListener('click', apriLogin);
            document.getElementById('btnLogout')?.addEventListener('click', () => { isAdmin = false; render(); });
            document.getElementById('btnAggiungiAnimatore')?.addEventListener('click', apriModaleAggiungiAnimatore);
            document.getElementById('btnGestisciSquadre')?.addEventListener('click', apriGestioneSquadre);
            
            document.getElementById('tabTutti')?.addEventListener('click', () => cambiaTab('tutti'));
            document.getElementById('tabAnimatori')?.addEventListener('click', () => cambiaTab('animatori'));
            document.getElementById('tabAiuti')?.addEventListener('click', () => cambiaTab('aiuti'));
            document.getElementById('tabSquadre')?.addEventListener('click', () => cambiaTab('squadre'));

            // Avvia listener Firebase
            avviaListener();
        };

        // === LISTENER FIRESTORE ===
        const avviaListener = () => {
            if (unsubscribeAnimatori) unsubscribeAnimatori();
            if (unsubscribeSquadre) unsubscribeSquadre();
            
            // Ascolta animatori
            const qAnimatori = query(animatoriRef, orderBy("punti", "desc"));
            unsubscribeAnimatori = onSnapshot(qAnimatori, (snapshot) => {
                animatori = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                aggiornaUI();
                document.getElementById('totaleAnimatori') && (document.getElementById('totaleAnimatori').textContent = animatori.length);
            }, (error) => {
                console.error("Errore Firestore animatori:", error);
            });

            // Ascolta squadre
            const qSquadre = query(squadreRef);
            unsubscribeSquadre = onSnapshot(qSquadre, (snapshot) => {
                squadre = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                aggiornaUI();
                document.getElementById('totaleSquadre') && (document.getElementById('totaleSquadre').textContent = squadre.length);
            }, (error) => {
                console.error("Errore Firestore squadre:", error);
            });
        };

        // === AGGIORNA UI ===
        const aggiornaUI = () => {
            const mainContent = document.getElementById('mainContent');
            if (!mainContent) return;

            if (currentTab === 'tutti') mainContent.innerHTML = renderTutti();
            else if (currentTab === 'animatori') mainContent.innerHTML = renderAnimatori();
            else if (currentTab === 'aiuti') mainContent.innerHTML = renderAiuti();
            else if (currentTab === 'squadre') mainContent.innerHTML = renderSquadre();
        };

        // === RENDER TUTTI (Animatori + Aiuti insieme) ===
        const renderTutti = () => {
            if (animatori.length === 0) {
                return '<div class="text-center text-slate-500 py-12">Nessun animatore</div>';
            }

            let html = '<div class="space-y-2">';
            
            animatori.forEach((anim, index) => {
                const pos = index + 1;
                let medaglia = '📌';
                let bgColor = '';
                
                if (pos === 1) { medaglia = '🥇'; bgColor = 'bg-amber-500/10 border-l-4 border-amber-500'; }
                else if (pos === 2) { medaglia = '🥈'; bgColor = 'bg-slate-400/10 border-l-4 border-slate-400'; }
                else if (pos === 3) { medaglia = '🥉'; bgColor = 'bg-amber-700/10 border-l-4 border-amber-700'; }

                const nomeCompleto = anim.cognome 
                    ? `${anim.nome} ${anim.cognome}` 
                    : anim.nome;

                const ruoloBadge = anim.ruolo === 'aiutoanimatore' 
                    ? '<span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full">🆘 Aiuto</span>' 
                    : '<span class="text-xs bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full">👤 Animatore</span>';

                html += `
                    <div class="card bg-slate-800 p-4 rounded-xl ${bgColor} ${isAdmin ? 'cursor-pointer hover:bg-slate-700' : ''}" 
                         ${isAdmin ? `onclick="apriProfilo('${anim.id}')"` : ''}>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl w-8">${medaglia}</span>
                                <div>
                                    <h3 class="font-bold text-white">${escapeHtml(nomeCompleto)}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        ${ruoloBadge}
                                        <span class="text-xs text-slate-400">${escapeHtml(getNomeSquadra(anim.squadraId))}</span>
                                    </div>
                                </div>
                            </div>
                            <span class="bg-slate-700 text-amber-400 font-bold px-4 py-2 rounded-full text-xl">${anim.punti || 0}</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            return html;
        };

        // === RENDER SOLO ANIMATORI ===
        const renderAnimatori = () => {
            const animatoriFiltrati = animatori.filter(a => a.ruolo === 'animatore' || !a.ruolo);
            
            if (animatoriFiltrati.length === 0) {
                return '<div class="text-center text-slate-500 py-12">Nessun animatore</div>';
            }

            let html = '<div class="space-y-2">';
            
            animatoriFiltrati.forEach((anim, index) => {
                const pos = index + 1;
                let medaglia = '📌';
                
                if (pos === 1) medaglia = '🥇';
                else if (pos === 2) medaglia = '🥈';
                else if (pos === 3) medaglia = '🥉';

                const nomeCompleto = anim.cognome 
                    ? `${anim.nome} ${anim.cognome}` 
                    : anim.nome;

                html += `
                    <div class="card bg-slate-800 p-4 rounded-xl ${isAdmin ? 'cursor-pointer hover:bg-slate-700' : ''}" 
                         ${isAdmin ? `onclick="apriProfilo('${anim.id}')"` : ''}>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl w-8">${medaglia}</span>
                                <div>
                                    <h3 class="font-bold text-white">${escapeHtml(nomeCompleto)}</h3>
                                    <p class="text-sm text-slate-400">${escapeHtml(getNomeSquadra(anim.squadraId))}</p>
                                </div>
                            </div>
                            <span class="bg-slate-700 text-amber-400 font-bold px-4 py-2 rounded-full text-xl">${anim.punti || 0}</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            return html;
        };

        // === RENDER SOLO AIUTO-ANIMATORI ===
        const renderAiuti = () => {
            const aiutiFiltrati = animatori.filter(a => a.ruolo === 'aiutoanimatore');
            
            if (aiutiFiltrati.length === 0) {
                return '<div class="text-center text-slate-500 py-12">Nessun aiuto-animatore</div>';
            }

            let html = '<div class="space-y-2">';
            
            aiutiFiltrati.forEach((anim, index) => {
                const pos = index + 1;
                let medaglia = '📌';
                
                if (pos === 1) medaglia = '🥇';
                else if (pos === 2) medaglia = '🥈';
                else if (pos === 3) medaglia = '🥉';

                const nomeCompleto = anim.cognome 
                    ? `${anim.nome} ${anim.cognome}` 
                    : anim.nome;

                html += `
                    <div class="card bg-slate-800 p-4 rounded-xl border-l-4 border-blue-500 ${isAdmin ? 'cursor-pointer hover:bg-slate-700' : ''}" 
                         ${isAdmin ? `onclick="apriProfilo('${anim.id}')"` : ''}>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl w-8">${medaglia}</span>
                                <div>
                                    <h3 class="font-bold text-white">${escapeHtml(nomeCompleto)}</h3>
                                    <p class="text-sm text-slate-400">${escapeHtml(getNomeSquadra(anim.squadraId))}</p>
                                </div>
                            </div>
                            <span class="bg-slate-700 text-amber-400 font-bold px-4 py-2 rounded-full text-xl">${anim.punti || 0}</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            return html;
        };

        // === RENDER CLASSIFICA SQUADRE (divise per fascia) ===
        const renderSquadre = () => {
            if (squadre.length === 0) {
                return '<div class="text-center text-slate-500 py-12">Nessuna squadra creata</div>';
            }

            // Calcola punti totali per ogni squadra
            const squadreConPunti = squadre.map(s => ({
                ...s,
                puntiTotali: calcolaPuntiSquadra(s.id)
            }));

            // Raggruppa per fascia
            const fascia1 = squadreConPunti.filter(s => s.fascia === 1).sort((a, b) => b.puntiTotali - a.puntiTotali);
            const fascia2 = squadreConPunti.filter(s => s.fascia === 2).sort((a, b) => b.puntiTotali - a.puntiTotali);
            const fascia3 = squadreConPunti.filter(s => s.fascia === 3).sort((a, b) => b.puntiTotali - a.puntiTotali);

            let html = '<div class="space-y-6">';

            // Fascia 1
            if (fascia1.length > 0) {
                html += `
                    <div>
                        <h2 class="text-lg font-bold text-amber-400 mb-3 flex items-center gap-2">
                            <span class="fascia-badge fascia-1">Fascia 1</span>
                            <span class="text-sm text-slate-400">${fascia1.length} squadre</span>
                        </h2>
                        <div class="space-y-3">
                            ${fascia1.map((squadra, index) => renderSquadraCard(squadra, index + 1)).join('')}
                        </div>
                    </div>
                `;
            }

            // Fascia 2
            if (fascia2.length > 0) {
                html += `
                    <div>
                        <h2 class="text-lg font-bold text-slate-400 mb-3 flex items-center gap-2">
                            <span class="fascia-badge fascia-2">Fascia 2</span>
                            <span class="text-sm text-slate-400">${fascia2.length} squadre</span>
                        </h2>
                        <div class="space-y-3">
                            ${fascia2.map((squadra, index) => renderSquadraCard(squadra, index + 1)).join('')}
                        </div>
                    </div>
                `;
            }

            // Fascia 3
            if (fascia3.length > 0) {
                html += `
                    <div>
                        <h2 class="text-lg font-bold text-amber-700 mb-3 flex items-center gap-2">
                            <span class="fascia-badge fascia-3">Fascia 3</span>
                            <span class="text-sm text-slate-400">${fascia3.length} squadre</span>
                        </h2>
                        <div class="space-y-3">
                            ${fascia3.map((squadra, index) => renderSquadraCard(squadra, index + 1)).join('')}
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        };

        // === RENDER CARD SINGOLA SQUADRA ===
        const renderSquadraCard = (squadra, posizione) => {
            const membri = animatori.filter(a => a.squadraId === squadra.id);
            
            return `
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <span class="text-xl font-bold text-amber-400">#${posizione}</span>
                            <h3 class="text-lg font-bold text-white">${escapeHtml(squadra.nome)}</h3>
                        </div>
                        <span class="bg-amber-500/20 text-amber-400 font-bold px-4 py-1 rounded-full">
                            ${squadra.puntiTotali} pts
                        </span>
                    </div>
                    
                    ${membri.length > 0 ? `
                        <div class="space-y-1 mt-2">
                            ${membri
                                .sort((a, b) => (b.punti || 0) - (a.punti || 0))
                                .map(anim => {
                                    const nomeCompleto = anim.cognome ? `${anim.nome} ${anim.cognome}` : anim.nome;
                                    const ruoloIcon = anim.ruolo === 'aiutoanimatore' ? '🆘' : '👤';
                                    return `
                                        <div class="flex items-center justify-between text-sm py-1 ${isAdmin ? 'cursor-pointer hover:bg-slate-700 px-2 rounded' : ''}" 
                                             ${isAdmin ? `onclick="apriProfilo('${anim.id}')"` : ''}>
                                            <span class="text-slate-300">
                                                ${ruoloIcon} ${escapeHtml(nomeCompleto)}
                                            </span>
                                            <span class="text-amber-400 font-bold">${anim.punti || 0}</span>
                                        </div>
                                    `;
                                }).join('')}
                        </div>
                    ` : '<p class="text-sm text-slate-500 italic">Nessun membro</p>'}
                </div>
            `;
        };

        // === LOGIN ===
        const apriLogin = () => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/80 flex items-end z-50 modal';
            overlay.innerHTML = `
                <div class="bg-slate-800 w-full rounded-t-2xl p-6 space-y-4">
                    <h2 class="text-xl font-bold text-amber-400 text-center">🔐 Accesso Admin</h2>
                    <input type="text" id="username" placeholder="Username" class="w-full bg-slate-700 p-4 rounded-lg text-white" autofocus>
                    <input type="password" id="password" placeholder="Password" class="w-full bg-slate-700 p-4 rounded-lg text-white">
                    <div class="grid grid-cols-2 gap-3">
                        <button id="annulla" class="bg-slate-700 p-4 rounded-lg hover:bg-slate-600">Annulla</button>
                        <button id="accedi" class="bg-amber-500 text-slate-900 p-4 rounded-lg font-bold hover:bg-amber-400">Accedi</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            const chiudi = () => overlay.remove();
            
            overlay.addEventListener('click', (e) => { if (e.target === overlay) chiudi(); });
            document.getElementById('annulla').addEventListener('click', chiudi);
            document.getElementById('accedi').addEventListener('click', () => {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                
                if (user === 'admin' && pass === 'grest2026') {
                    isAdmin = true;
                    chiudi();
                    render();
                } else {
                    alert('Credenziali errate');
                }
            });
        };

        // === MODALE AGGIUNGI ANIMATORE ===
        const apriModaleAggiungiAnimatore = () => {
            if (squadre.length === 0) {
                if (!confirm('Non ci sono squadre. Vuoi prima crearne una?')) return;
                apriGestioneSquadre();
                return;
            }

            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/80 flex items-end z-50 modal';
            
            let optionsSquadre = '<option value="">Senza squadra</option>';
            squadre.forEach(s => {
                optionsSquadre += `<option value="${s.id}">${escapeHtml(s.nome)} (Fascia ${s.fascia})</option>`;
            });

            overlay.innerHTML = `
                <div class="bg-slate-800 w-full rounded-t-2xl p-6 space-y-4">
                    <h2 class="text-xl font-bold text-amber-400 text-center">➕ Nuovo Animatore</h2>
                    
                    <input type="text" id="nome" placeholder="Nome *" class="w-full bg-slate-700 p-4 rounded-lg text-white" autofocus>
                    <input type="text" id="cognome" placeholder="Cognome" class="w-full bg-slate-700 p-4 rounded-lg text-white">
                    
                    <select id="ruolo" class="w-full bg-slate-700 p-4 rounded-lg text-white">
                        <option value="animatore">👤 Animatore</option>
                        <option value="aiutoanimatore">🆘 Aiuto-Animatore</option>
                    </select>
                    
                    <select id="squadra" class="w-full bg-slate-700 p-4 rounded-lg text-white">
                        ${optionsSquadre}
                    </select>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button id="annulla" class="bg-slate-700 p-4 rounded-lg hover:bg-slate-600">Annulla</button>
                        <button id="salva" class="bg-amber-500 text-slate-900 p-4 rounded-lg font-bold hover:bg-amber-400">Salva</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            const chiudi = () => overlay.remove();
            
            overlay.addEventListener('click', (e) => { if (e.target === overlay) chiudi(); });
            document.getElementById('annulla').addEventListener('click', chiudi);
            document.getElementById('salva').addEventListener('click', async () => {
                const nome = document.getElementById('nome').value.trim();
                if (!nome) { alert('Inserisci il nome'); return; }
                
                try {
                    await addDoc(animatoriRef, {
                        nome: nome,
                        cognome: document.getElementById('cognome').value.trim(),
                        ruolo: document.getElementById('ruolo').value,
                        squadraId: document.getElementById('squadra').value || null,
                        punti: 0
                    });
                    chiudi();
                } catch (error) {
                    alert('Errore: ' + error.message);
                }
            });
        };

        // === GESTIONE SQUADRE ===
        const apriGestioneSquadre = () => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/80 flex items-end z-50 modal';
            overlay.innerHTML = `
                <div class="bg-slate-800 w-full rounded-t-2xl p-6 space-y-4 max-h-[90vh] overflow-y-auto">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold text-amber-400">⚙️ Gestione Squadre</h2>
                        <button id="chiudi" class="text-slate-400 text-2xl">&times;</button>
                    </div>

                    <!-- Form nuova squadra -->
                    <div class="bg-slate-900 p-4 rounded-lg space-y-3">
                        <h3 class="font-bold text-white">Nuova Squadra</h3>
                        <input type="text" id="nuovaSquadraNome" placeholder="Nome squadra" class="w-full bg-slate-700 p-3 rounded-lg text-white">
                        <select id="nuovaSquadraFascia" class="w-full bg-slate-700 p-3 rounded-lg text-white">
                            <option value="1">Fascia 1</option>
                            <option value="2">Fascia 2</option>
                            <option value="3">Fascia 3</option>
                        </select>
                        <button id="btnCreaSquadra" class="w-full bg-amber-500 text-slate-900 p-3 rounded-lg font-bold hover:bg-amber-400">
                            ➕ Crea Squadra
                        </button>
                    </div>

                    <!-- Lista squadre esistenti -->
                    <div class="space-y-2">
                        <h3 class="font-bold text-white">Squadre Esistenti</h3>
                        ${squadre.map(s => `
                            <div class="bg-slate-700 p-3 rounded-lg flex items-center justify-between">
                                <div>
                                    <span class="font-bold text-white">${escapeHtml(s.nome)}</span>
                                    <span class="text-xs ml-2 fascia-badge fascia-${s.fascia}">Fascia ${s.fascia}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="modificaSquadra('${s.id}')" class="text-amber-400 hover:text-amber-300">✏️</button>
                                    <button onclick="eliminaSquadra('${s.id}')" class="text-red-400 hover:text-red-300">🗑️</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            const chiudi = () => overlay.remove();
            document.getElementById('chiudi').addEventListener('click', chiudi);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) chiudi(); });

            // Crea nuova squadra
            document.getElementById('btnCreaSquadra').addEventListener('click', async () => {
                const nome = document.getElementById('nuovaSquadraNome').value.trim();
                const fascia = parseInt(document.getElementById('nuovaSquadraFascia').value);
                
                if (!nome) { alert('Inserisci il nome della squadra'); return; }
                
                try {
                    await addDoc(squadreRef, {
                        nome: nome,
                        fascia: fascia
                    });
                    document.getElementById('nuovaSquadraNome').value = '';
                    alert('Squadra creata!');
                } catch (error) {
                    alert('Errore: ' + error.message);
                }
            });

            // Funzioni modifica/elimina
            window.modificaSquadra = (id) => {
                const squadra = squadre.find(s => s.id === id);
                if (!squadra) return;
                
                const nuovoNome = prompt('Modifica nome squadra:', squadra.nome);
                if (nuovoNome === null) return;
                
                const nuovaFascia = prompt('Modifica fascia (1,2,3):', squadra.fascia);
                if (nuovaFascia === null) return;
                
                if (!nuovoNome.trim()) { alert('Il nome non può essere vuoto'); return; }
                
                const fasciaNum = parseInt(nuovaFascia);
                if (isNaN(fasciaNum) || fasciaNum < 1 || fasciaNum > 3) {
                    alert('La fascia deve essere 1, 2 o 3');
                    return;
                }
                
                updateDoc(doc(db, 'squadre', id), {
                    nome: nuovoNome.trim(),
                    fascia: fasciaNum
                }).catch(error => alert('Errore: ' + error.message));
            };

            window.eliminaSquadra = async (id) => {
                // Controlla se ci sono animatori in questa squadra
                const animatoriInSquadra = animatori.filter(a => a.squadraId === id);
                
                if (animatoriInSquadra.length > 0) {
                    const msg = `Ci sono ${animatoriInSquadra.length} animatori in questa squadra. Verranno lasciati senza squadra. Continuare?`;
                    if (!confirm(msg)) return;
                    
                    // Rimuovi squadraId da tutti gli animatori
                    const batch = writeBatch(db);
                    animatoriInSquadra.forEach(anim => {
                        const animRef = doc(db, 'animatori', anim.id);
                        batch.update(animRef, { squadraId: null });
                    });
                    await batch.commit();
                }
                
                if (confirm('Eliminare questa squadra?')) {
                    await deleteDoc(doc(db, 'squadre', id));
                }
            };
        };

        // === PROFILO ANIMATORE ===
        window.apriProfilo = (id) => {
            if (!isAdmin) return;
            
            const anim = animatori.find(a => a.id === id);
            if (!anim) return;
            
            const nomeCompleto = anim.cognome 
                ? `${anim.nome} ${anim.cognome}` 
                : anim.nome;
            
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/80 flex items-end z-50 modal';
            
            // Opzioni squadre per il select
            let optionsSquadre = '<option value="">Senza squadra</option>';
            squadre.forEach(s => {
                const selected = s.id === anim.squadraId ? 'selected' : '';
                optionsSquadre += `<option value="${s.id}" ${selected}>${escapeHtml(s.nome)} (Fascia ${s.fascia})</option>`;
            });

            overlay.innerHTML = `
                <div class="bg-slate-800 w-full rounded-t-2xl p-6 space-y-4 max-h-[90vh] overflow-y-auto">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold text-amber-400">${escapeHtml(nomeCompleto)}</h2>
                        <button id="chiudi" class="text-slate-400 text-2xl">&times;</button>
                    </div>
                    
                    <div class="bg-slate-900 p-4 rounded-xl text-center">
                        <p class="text-5xl font-bold text-amber-400" id="puntiDisplay">${anim.punti || 0}</p>
                    </div>
                    
                    <!-- Pulsanti punti -->
                    <div class="grid grid-cols-4 gap-2">
                        <button data-delta="1" class="btn-punti bg-slate-700 p-4 rounded-xl text-amber-400 text-xl font-bold hover:bg-slate-600">+1</button>
                        <button data-delta="5" class="btn-punti bg-slate-700 p-4 rounded-xl text-amber-400 text-xl font-bold hover:bg-slate-600">+5</button>
                        <button data-delta="10" class="btn-punti bg-slate-700 p-4 rounded-xl text-amber-400 text-xl font-bold hover:bg-slate-600">+10</button>
                        <button data-delta="-5" class="btn-punti bg-slate-700 p-4 rounded-xl text-amber-400 text-xl font-bold hover:bg-slate-600">-5</button>
                    </div>
                    
                    <!-- Modifica dati -->
                    <input type="text" id="modNome" value="${escapeHtml(anim.nome)}" placeholder="Nome" class="w-full bg-slate-700 p-4 rounded-lg">
                    <input type="text" id="modCognome" value="${escapeHtml(anim.cognome || '')}" placeholder="Cognome" class="w-full bg-slate-700 p-4 rounded-lg">
                    
                    <select id="modRuolo" class="w-full bg-slate-700 p-4 rounded-lg text-white">
                        <option value="animatore" ${anim.ruolo !== 'aiutoanimatore' ? 'selected' : ''}>👤 Animatore</option>
                        <option value="aiutoanimatore" ${anim.ruolo === 'aiutoanimatore' ? 'selected' : ''}>🆘 Aiuto-Animatore</option>
                    </select>
                    
                    <select id="modSquadra" class="w-full bg-slate-700 p-4 rounded-lg text-white">
                        ${optionsSquadre}
                    </select>
                    
                    <button id="salvaMod" class="w-full bg-amber-500 text-slate-900 p-4 rounded-lg font-bold hover:bg-amber-400">💾 Salva modifiche</button>
                    
                    <!-- Elimina -->
                    <button id="elimina" class="w-full bg-red-500/20 text-red-400 p-4 rounded-lg border border-red-500/30 hover:bg-red-500/30">🗑️ Elimina</button>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            // Chiudi
            const chiudi = () => overlay.remove();
            document.getElementById('chiudi').addEventListener('click', chiudi);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) chiudi(); });
            
            // === PULSANTI CON CLICK MULTIPLI ===
            let clickTimeout = null;
            let clickCount = 0;
            let ultimoBottone = null;
            
            overlay.querySelectorAll('.btn-punti').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const delta = parseInt(btn.dataset.delta);
                    const x = e.clientX;
                    const y = e.clientY;
                    
                    if (ultimoBottone === btn) {
                        clickCount++;
                        if (clickTimeout) clearTimeout(clickTimeout);
                        
                        mostraIncremento(x, y, delta);
                        
                        const nuoviPunti = (anim.punti || 0) + (delta * clickCount);
                        
                        try {
                            await updateDoc(doc(db, 'animatori', id), { punti: nuoviPunti });
                            document.getElementById('puntiDisplay').textContent = nuoviPunti;
                            anim.punti = nuoviPunti;
                            
                            document.getElementById('puntiDisplay').classList.add('text-amber-300', 'scale-110');
                            setTimeout(() => {
                                document.getElementById('puntiDisplay').classList.remove('text-amber-300', 'scale-110');
                            }, 200);
                            
                        } catch (error) {
                            alert('Errore: ' + error.message);
                        }
                        
                        clickTimeout = setTimeout(() => {
                            clickCount = 0;
                            ultimoBottone = null;
                        }, 500);
                        
                    } else {
                        clickCount = 1;
                        ultimoBottone = btn;
                        
                        mostraIncremento(x, y, delta);
                        
                        const nuoviPunti = (anim.punti || 0) + delta;
                        
                        try {
                            await updateDoc(doc(db, 'animatori', id), { punti: nuoviPunti });
                            document.getElementById('puntiDisplay').textContent = nuoviPunti;
                            anim.punti = nuoviPunti;
                            
                            document.getElementById('puntiDisplay').classList.add('text-amber-300', 'scale-110');
                            setTimeout(() => {
                                document.getElementById('puntiDisplay').classList.remove('text-amber-300', 'scale-110');
                            }, 200);
                            
                        } catch (error) {
                            alert('Errore: ' + error.message);
                        }
                        
                        clickTimeout = setTimeout(() => {
                            clickCount = 0;
                            ultimoBottone = null;
                        }, 500);
                    }
                });
            });
            
            // Salva modifiche
            document.getElementById('salvaMod').addEventListener('click', async () => {
                const nuovoNome = document.getElementById('modNome').value.trim();
                if (!nuovoNome) { alert('Il nome è obbligatorio'); return; }
                
                try {
                    await updateDoc(doc(db, 'animatori', id), {
                        nome: nuovoNome,
                        cognome: document.getElementById('modCognome').value.trim(),
                        ruolo: document.getElementById('modRuolo').value,
                        squadraId: document.getElementById('modSquadra').value || null
                    });
                    chiudi();
                } catch (error) {
                    alert('Errore: ' + error.message);
                }
            });
            
            // Elimina
            document.getElementById('elimina').addEventListener('click', async () => {
                if (confirm(`Eliminare ${nomeCompleto}?`)) {
                    try {
                        await deleteDoc(doc(db, 'animatori', id));
                        chiudi();
                    } catch (error) {
                        alert('Errore: ' + error.message);
                    }
                }
            });
        };

        // === AVVIO ===
        render();
    </script>
</body>
</html>
